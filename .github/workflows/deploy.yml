name: Deploy to Vercel (reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: Vercel environment — preview | stage | production. Not required when transferred is true.
        required: false
        type: string
      node-version:
        description: Node version.
        required: false
        type: string
        default: '24'
      package-manager:
        description: Explicit override for package manager (pnpm | npm | bun). Auto-detected by lockfile if empty.
        required: false
        type: string
        default: ''
      platform-ref:
        description: Ref of the platform repo to checkout for composite actions.
        required: false
        type: string
        default: main
      transferred:
        description: |
          Set to true when this repo has been handed off to a client's Vercel team. The deploy
          job logs a skip notice and exits 0 without invoking Vercel — no failed runs, no noise.
          Default false. Only the deploy is skipped; CI (lint/typecheck/test/build) is unaffected.
        required: false
        type: boolean
        default: false
      unsafe-install-scripts:
        description: |
          DANGEROUS — setting to true lets dependencies run postinstall scripts. A compromised
          dependency can exfiltrate secrets. Default false. Only enable if your project needs
          postinstall (native modules like sharp, bcrypt, puppeteer).
        required: false
        type: boolean
        default: false
    secrets:
      # required: false so a transferred repo (whose Vercel secrets may be stale or removed)
      # can still call this reusable — the deploy steps are skipped when transferred is true.
      VERCEL_TOKEN:
        required: false
      VERCEL_ORG_ID:
        required: false
      VERCEL_PROJECT_ID:
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Transferred repo — skip deploy
        if: ${{ inputs.transferred }}
        run: |
          echo "[deploy] skipped: repo marked as transferred"
        shell: bash

      - name: Validate environment input
        if: ${{ !inputs.transferred }}
        run: |
          case "${{ inputs.environment }}" in
            preview|stage|production) ;;
            *) echo "::error::environment must be preview, stage, or production (got: ${{ inputs.environment }})"; exit 1 ;;
          esac
        shell: bash

      - name: Checkout caller repo
        if: ${{ !inputs.transferred }}
        uses: actions/checkout@v7

      - name: Checkout platform repo (for composite actions)
        if: ${{ !inputs.transferred }}
        uses: actions/checkout@v7
        with:
          repository: refokus-agency/platform
          ref: ${{ inputs.platform-ref }}
          path: .platform

      - name: Configure npm for GitHub Packages
        if: ${{ !inputs.transferred }}
        run: |
          echo "@refokus-agency:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
        shell: bash

      - name: Setup
        id: setup
        if: ${{ !inputs.transferred }}
        uses: ./.platform/.github/actions/setup
        with:
          node-version: ${{ inputs.node-version }}
          package-manager: ${{ inputs.package-manager }}
          unsafe-install-scripts: ${{ inputs.unsafe-install-scripts }}

      - name: Map environment to Vercel flags
        id: vercel
        if: ${{ !inputs.transferred }}
        shell: bash
        run: |
          case "${{ inputs.environment }}" in
            production)
              echo "pull-env=production" >> "$GITHUB_OUTPUT"
              echo "build-flag=--prod" >> "$GITHUB_OUTPUT"
              echo "deploy-flag=--prod" >> "$GITHUB_OUTPUT"
              ;;
            stage|preview)
              echo "pull-env=preview" >> "$GITHUB_OUTPUT"
              echo "build-flag=" >> "$GITHUB_OUTPUT"
              echo "deploy-flag=" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Install Vercel CLI
        if: ${{ !inputs.transferred }}
        run: npm install -g vercel@latest
        shell: bash

      - name: Vercel pull
        if: ${{ !inputs.transferred }}
        run: vercel pull --yes --environment=${{ steps.vercel.outputs.pull-env }} --token=${{ secrets.VERCEL_TOKEN }}
        shell: bash

      - name: Vercel build
        if: ${{ !inputs.transferred }}
        run: vercel build ${{ steps.vercel.outputs.build-flag }} --token=${{ secrets.VERCEL_TOKEN }}
        shell: bash

      - name: Vercel deploy
        id: deploy
        if: ${{ !inputs.transferred }}
        run: |
          URL=$(vercel deploy --prebuilt ${{ steps.vercel.outputs.deploy-flag }} --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $URL"
        shell: bash

      - name: Alias for stage
        if: ${{ !inputs.transferred && inputs.environment == 'stage' }}
        run: |
          STAGE_ALIAS="${GITHUB_REPOSITORY##*/}-stage.vercel.app"
          vercel alias set "${{ steps.deploy.outputs.url }}" "$STAGE_ALIAS" \
            --scope "${{ secrets.VERCEL_ORG_ID }}" \
            --token="${{ secrets.VERCEL_TOKEN }}"
        shell: bash

      - name: Comment deploy URL on PR
        if: ${{ !inputs.transferred && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
          DEPLOY_ENV: ${{ inputs.environment }}
        with:
          script: |
            const marker = '<!-- vercel-deploy-comment -->';
            const body = `${marker}\n**Vercel ${process.env.DEPLOY_ENV} deploy:** ${process.env.DEPLOY_URL}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find((c) => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
