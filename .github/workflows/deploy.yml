name: Deploy to Vercel (reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: Vercel environment — preview | stage | production.
        required: true
        type: string
      node-version:
        description: Node version.
        required: false
        type: string
        default: '24'
      package-manager:
        description: Explicit override for package manager (pnpm | npm | bun). Auto-detected by lockfile if empty.
        required: false
        type: string
        default: ''
      platform-ref:
        description: Ref of the platform repo to checkout for composite actions.
        required: false
        type: string
        default: main
      unsafe-install-scripts:
        description: |
          DANGEROUS — setting to true lets dependencies run postinstall scripts. A compromised
          dependency can exfiltrate secrets. Default false. Only enable if your project needs
          postinstall (native modules like sharp, bcrypt, puppeteer).
        required: false
        type: boolean
        default: false
      submodules:
        description: |
          Checkout git submodules. Set to true if your repo has submodules (e.g. a shared code
          submodule). Requires CHECKOUT_TOKEN if any submodule points at a private repo other
          than the caller's own — the default GITHUB_TOKEN can't read across repos.
        required: false
        type: boolean
        default: false
    secrets:
      VERCEL_TOKEN:
        required: true
      VERCEL_ORG_ID:
        required: true
      VERCEL_PROJECT_ID:
        required: true
      CHECKOUT_TOKEN:
        description: |
          Token used to checkout the caller repo and its submodules. Only needed when
          submodules is true and a submodule points at a different private repo. Falls back
          to the default GITHUB_TOKEN when not provided.
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # No explicit permissions block on purpose: the job inherits the caller's
    # granted permissions. Declaring a scope here (e.g. `deployments: write`)
    # would force EVERY caller to grant it or the run fails at startup. By
    # inheriting, the "Record GitHub deployment" step below stays opt-in —
    # callers that grant `deployments: write` get deploys recorded; those that
    # don't simply skip it. Callers still need `contents: read` (checkout) and
    # `pull-requests: write` (PR comment); see examples/*.yml.
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Validate environment input
        run: |
          case "${{ inputs.environment }}" in
            preview|stage|production) ;;
            *) echo "::error::environment must be preview, stage, or production (got: ${{ inputs.environment }})"; exit 1 ;;
          esac
        shell: bash

      - name: Checkout caller repo
        uses: actions/checkout@v7
        with:
          submodules: ${{ inputs.submodules }}
          token: ${{ secrets.CHECKOUT_TOKEN || github.token }}

      - name: Checkout platform repo (for composite actions)
        uses: actions/checkout@v7
        with:
          repository: refokus-agency/platform
          ref: ${{ inputs.platform-ref }}
          path: .platform

      - name: Configure npm for GitHub Packages
        run: |
          echo "@refokus-agency:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
        shell: bash

      - name: Setup
        id: setup
        uses: ./.platform/.github/actions/setup
        with:
          node-version: ${{ inputs.node-version }}
          package-manager: ${{ inputs.package-manager }}
          unsafe-install-scripts: ${{ inputs.unsafe-install-scripts }}

      - name: Map environment to Vercel flags
        id: vercel
        shell: bash
        run: |
          case "${{ inputs.environment }}" in
            production)
              echo "pull-env=production" >> "$GITHUB_OUTPUT"
              echo "build-flag=--prod" >> "$GITHUB_OUTPUT"
              echo "deploy-flag=--prod" >> "$GITHUB_OUTPUT"
              ;;
            stage|preview)
              echo "pull-env=preview" >> "$GITHUB_OUTPUT"
              echo "build-flag=" >> "$GITHUB_OUTPUT"
              echo "deploy-flag=" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Install Vercel CLI
        run: npm install -g vercel@latest
        shell: bash

      - name: Vercel pull
        run: vercel pull --yes --environment=${{ steps.vercel.outputs.pull-env }} --token=${{ secrets.VERCEL_TOKEN }}
        shell: bash

      - name: Vercel build
        run: vercel build ${{ steps.vercel.outputs.build-flag }} --token=${{ secrets.VERCEL_TOKEN }}
        shell: bash

      - name: Vercel deploy
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt ${{ steps.vercel.outputs.deploy-flag }} --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $URL"
        shell: bash

      - name: Alias for stage
        if: inputs.environment == 'stage'
        run: |
          STAGE_ALIAS="${GITHUB_REPOSITORY##*/}-stage.vercel.app"
          vercel alias set "${{ steps.deploy.outputs.url }}" "$STAGE_ALIAS" \
            --scope "${{ secrets.VERCEL_ORG_ID }}" \
            --token="${{ secrets.VERCEL_TOKEN }}"
        shell: bash

      - name: Comment deploy URL on PR
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v9
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
          DEPLOY_ENV: ${{ inputs.environment }}
        with:
          script: |
            const marker = '<!-- vercel-deploy-comment -->';
            const body = `${marker}\n**Vercel ${process.env.DEPLOY_ENV} deploy:** ${process.env.DEPLOY_URL}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find((c) => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Record GitHub deployment
        # Only for the persistent environments (production/stage). Preview PR
        # deploys are ephemeral and already surfaced via the PR comment above.
        if: ${{ inputs.environment == 'production' || inputs.environment == 'stage' }}
        uses: actions/github-script@v7
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
          ENVIRONMENT: ${{ inputs.environment }}
          REF: ${{ github.ref_name }}
        with:
          script-path: .platform/.github/scripts/record-github-deployment.js
