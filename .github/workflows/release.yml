name: Release (reusable)

on:
  workflow_call:
    inputs:
      node-version:
        description: Node version.
        required: false
        type: string
        default: '24'
      package-manager:
        description: Explicit override for package manager (pnpm | npm | bun). Auto-detected by lockfile if empty.
        required: false
        type: string
        default: ''
      platform-ref:
        description: Ref of the platform repo to checkout for composite actions.
        required: false
        type: string
        default: main
      semantic-release-version:
        description: Version of semantic-release to install (passed to cycjimmy/semantic-release-action).
        required: false
        type: string
        default: '24'
      extra-plugins:
        description: Extra semantic-release plugins to install, newline- or space-separated. Defaults to the common Refokus set (@semantic-release/changelog, @semantic-release/git, @semantic-release/exec).
        required: false
        type: string
        default: |
          @semantic-release/changelog
          @semantic-release/git
          @semantic-release/exec
      unsafe-install-scripts:
        description: |
          DANGEROUS — setting to true lets dependencies run postinstall scripts. A compromised
          dependency can exfiltrate secrets. Default false. Only enable if your project needs
          postinstall (native modules like sharp, bcrypt, puppeteer).
        required: false
        type: boolean
        default: false
    secrets:
      RELEASE_APP_ID:
        description: |
          GitHub App ID used to mint a short-lived token that can bypass branch
          protection on `main`. Required when `@semantic-release/git` is in the
          plugins list and the default branch has a "PRs required" ruleset.
          Optional; if unset, the job falls back to the built-in GITHUB_TOKEN
          (which can't push to protected branches).
        required: false
      RELEASE_APP_PRIVATE_KEY:
        description: |
          PEM private key for the GitHub App referenced by RELEASE_APP_ID.
          Required if RELEASE_APP_ID is set.
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      issues: write
      pull-requests: write
    steps:
      - name: Mint release token (GitHub App)
        id: app-token
        if: ${{ secrets.RELEASE_APP_ID != '' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout caller repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout platform repo (for composite actions)
        uses: actions/checkout@v4
        with:
          repository: refokus-agency/platform
          ref: ${{ inputs.platform-ref }}
          path: .platform

      - name: Configure npm for GitHub Packages
        run: |
          echo "@refokus-agency:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
        shell: bash

      - name: Setup
        id: setup
        uses: ./.platform/.github/actions/setup
        with:
          node-version: ${{ inputs.node-version }}
          package-manager: ${{ inputs.package-manager }}
          unsafe-install-scripts: ${{ inputs.unsafe-install-scripts }}

      - name: Semantic release
        uses: cycjimmy/semantic-release-action@v4
        with:
          ci: true
          semantic_version: ${{ inputs.semantic-release-version }}
          extra_plugins: ${{ inputs.extra-plugins }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
