name: Release (reusable)

on:
  workflow_call:
    inputs:
      node-version:
        description: Node version.
        required: false
        type: string
        default: '24'
      package-manager:
        description: Explicit override for package manager (pnpm | npm | bun). Auto-detected by lockfile if empty.
        required: false
        type: string
        default: ''
      platform-ref:
        description: Ref of the platform repo to checkout for composite actions.
        required: false
        type: string
        default: main
      semantic-release-version:
        description: |
          Version of semantic-release to install (passed to cycjimmy/semantic-release-action).
          Defaults to major 25: @semantic-release/npm gained OIDC Trusted Publishing support
          in v13 (bundled with semantic-release v25). v24 (npm plugin v12) aborts with
          ENONPMTOKEN on the `npm` registry path before the OIDC exchange can run.
        required: false
        type: string
        default: '25'
      extra-plugins:
        description: Extra semantic-release plugins to install, newline- or space-separated. Defaults to the common Refokus set (@semantic-release/changelog, @semantic-release/git, @semantic-release/exec).
        required: false
        type: string
        default: |
          @semantic-release/changelog
          @semantic-release/git
          @semantic-release/exec
      unsafe-install-scripts:
        description: |
          DANGEROUS — setting to true lets dependencies run postinstall scripts. A compromised
          dependency can exfiltrate secrets. Default false. Only enable if your project needs
          postinstall (native modules like sharp, bcrypt, puppeteer).
        required: false
        type: boolean
        default: false
      registry:
        description: |
          Target registry for the publish. `github-packages` (default) keeps the existing
          GitHub Packages behavior. `npm` publishes to the public npm registry
          (registry.npmjs.org) via OIDC Trusted Publishing — no NPM_TOKEN required, but the
          package must have a Trusted Publisher configured on npmjs.org pointing at this
          workflow (release.yml), and the caller must grant `permissions: id-token: write`.
        required: false
        type: string
        default: github-packages
      npm-version:
        description: |
          npm CLI version to guarantee before publishing on the `npm` registry path. OIDC
          Trusted Publishing requires npm >= 11.5.1. The default tracks the npm bundled with
          the current Node LTS. Only installed when the runner's npm is older than this value;
          unused on the GitHub Packages path.
        required: false
        type: string
        default: 11.6.2
      provenance:
        description: |
          Generate npm provenance attestation on the `npm` registry path. Default false.
          Provenance requires a PUBLIC repository — leave false while the caller repo is
          private or the publish will fail. Ignored on the GitHub Packages path.
        required: false
        type: boolean
        default: false
    secrets:
      RELEASE_APP_ID:
        description: |
          GitHub App ID used to mint a short-lived token that can bypass branch
          protection on `main`. Required when `@semantic-release/git` is in the
          plugins list and the default branch has a "PRs required" ruleset.
          Optional; if unset, the job falls back to the built-in GITHUB_TOKEN
          (which can't push to protected branches).
        required: false
      RELEASE_APP_PRIVATE_KEY:
        description: |
          PEM private key for the GitHub App referenced by RELEASE_APP_ID.
          Required if RELEASE_APP_ID is set.
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      issues: write
      pull-requests: write
      # Required for OIDC Trusted Publishing on the `npm` registry path. Permissions are
      # job-level only, so it's declared unconditionally; the GitHub Packages path simply
      # never requests an OIDC token. Callers using `registry: npm` MUST also grant
      # `id-token: write` in their own caller workflow — without it the OIDC exchange fails
      # at runtime (GitHub never delegates a permission the caller didn't grant).
      id-token: write
    env:
      RELEASE_APP_ID: ${{ secrets.RELEASE_APP_ID }}
    steps:
      - name: Validate inputs
        run: |
          case '${{ inputs.registry }}' in
            github-packages|npm) ;;
            *)
              echo "::error::Unknown registry '${{ inputs.registry }}'. Must be 'github-packages' or 'npm'."
              exit 1
              ;;
          esac
          if [ '${{ inputs.registry }}' = 'npm' ]; then
            if ! printf '%s' '${{ inputs.npm-version }}' | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::npm-version must be a stable semver (X.Y.Z); got '${{ inputs.npm-version }}'."
              exit 1
            fi
          fi
        shell: bash

      - name: Mint release token (GitHub App)
        id: app-token
        if: env.RELEASE_APP_ID != ''
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout caller repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout platform repo (for composite actions)
        uses: actions/checkout@v7
        with:
          repository: refokus-agency/platform
          ref: ${{ inputs.platform-ref }}
          path: .platform

      - name: Configure npm for GitHub Packages
        if: inputs.registry == 'github-packages'
        run: |
          echo "@refokus-agency:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
        shell: bash

      - name: Setup
        id: setup
        uses: ./.platform/.github/actions/setup
        with:
          node-version: ${{ inputs.node-version }}
          package-manager: ${{ inputs.package-manager }}
          unsafe-install-scripts: ${{ inputs.unsafe-install-scripts }}

      - name: Ensure npm supports OIDC Trusted Publishing
        if: inputs.registry == 'npm'
        run: |
          required='${{ inputs.npm-version }}'
          current="$(npm -v)"
          lowest="$(printf '%s\n%s\n' "$current" "$required" | sort -V | head -n1)"
          if [ "$lowest" = "$required" ]; then
            echo "npm $current already satisfies >= $required"
          else
            echo "npm $current is older than $required — installing npm@$required"
            npm install -g "npm@$required"
          fi
          npm -v
        shell: bash

      - name: Semantic release (GitHub Packages)
        if: inputs.registry == 'github-packages'
        uses: cycjimmy/semantic-release-action@v6
        with:
          ci: true
          semantic_version: ${{ inputs.semantic-release-version }}
          extra_plugins: ${{ inputs.extra-plugins }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}

      # Public npm path: authenticate via OIDC Trusted Publishing. NODE_AUTH_TOKEN is
      # deliberately NOT set — if it were, npm would skip the OIDC exchange and try the
      # (nonexistent) static token. GITHUB_TOKEN is still needed for the GitHub release,
      # tagging and the @semantic-release/git push.
      - name: Semantic release (public npm via OIDC)
        if: inputs.registry == 'npm'
        uses: cycjimmy/semantic-release-action@v6
        with:
          ci: true
          semantic_version: ${{ inputs.semantic-release-version }}
          extra_plugins: ${{ inputs.extra-plugins }}
        env:
          NPM_CONFIG_PROVENANCE: ${{ inputs.provenance }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
