name: Release (reusable)

on:
  workflow_call:
    inputs:
      node-version:
        description: Node version.
        required: false
        type: string
        default: '24'
      package-manager:
        description: Explicit override for package manager (pnpm | npm | bun). Auto-detected by lockfile if empty.
        required: false
        type: string
        default: ''
      platform-ref:
        description: Ref of the platform repo to checkout for composite actions.
        required: false
        type: string
        default: main
      semantic-release-version:
        description: Version of semantic-release to install (passed to cycjimmy/semantic-release-action).
        required: false
        type: string
        default: '24'
      extra-plugins:
        description: Extra semantic-release plugins to install, newline- or space-separated. Defaults to the common Refokus set (@semantic-release/changelog, @semantic-release/git, @semantic-release/exec).
        required: false
        type: string
        default: |
          @semantic-release/changelog
          @semantic-release/git
          @semantic-release/exec
      unsafe-install-scripts:
        description: |
          DANGEROUS — setting to true lets dependencies run postinstall scripts. A compromised
          dependency can exfiltrate secrets. Default false. Only enable if your project needs
          postinstall (native modules like sharp, bcrypt, puppeteer).
        required: false
        type: boolean
        default: false
    secrets:
      GH_PAT_TOKEN:
        description: PAT with write:packages + contents:write for publishing and tagging.
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout platform repo (for composite actions)
        uses: actions/checkout@v6
        with:
          repository: refokus-agency/platform
          ref: ${{ inputs.platform-ref }}
          path: .platform
          token: ${{ secrets.GH_PAT_TOKEN }}

      - name: Configure npm for GitHub Packages
        run: |
          echo "@refokus-agency:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GH_PAT_TOKEN }}" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
        shell: bash

      - name: Setup
        id: setup
        uses: ./.platform/.github/actions/setup
        with:
          node-version: ${{ inputs.node-version }}
          package-manager: ${{ inputs.package-manager }}
          unsafe-install-scripts: ${{ inputs.unsafe-install-scripts }}

      - name: Semantic release
        uses: cycjimmy/semantic-release-action@v6
        with:
          ci: true
          semantic_version: ${{ inputs.semantic-release-version }}
          extra_plugins: ${{ inputs.extra-plugins }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
