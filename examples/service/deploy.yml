# Service deploy — runs CI and deploys to production on push to main.
# Copy to .github/workflows/deploy.yml in the service repo.

name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: refokus-agency/platform/.github/workflows/ci.yml@main
    secrets: inherit

  deploy-production:
    needs: ci
    uses: refokus-agency/platform/.github/workflows/deploy.yml@main
    with:
      environment: production
    secrets: inherit
