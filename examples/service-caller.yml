# Service caller — 2 environments (preview on PRs, production on push to main).
# Copy this file to .github/workflows/ci-cd.yml in the service repo.

name: CI + Deploy

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: refokus-agency/platform/.github/workflows/ci.yml@main
    secrets: inherit

  deploy-preview:
    needs: ci
    if: github.event_name == 'pull_request'
    uses: refokus-agency/platform/.github/workflows/deploy.yml@main
    with:
      environment: preview
    secrets: inherit

  deploy-production:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: refokus-agency/platform/.github/workflows/deploy.yml@main
    with:
      environment: production
    secrets: inherit
