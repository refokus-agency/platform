# CI on pull requests — lint + typecheck + test + build, no deploy.
# Copy to .github/workflows/pr-ci.yml in your repo.

name: Pull Request

on:
  pull_request:

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ci:
    uses: refokus-agency/platform/.github/workflows/ci.yml@v1
    secrets: inherit
