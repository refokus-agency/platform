# CI + semantic-release on push to main (for npm libraries).
# Copy to .github/workflows/main-release.yml in your repo.
#
# workflow_dispatch is kept as an escape hatch — lets you re-run a
# release from the Actions tab without pushing a new commit.

name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: refokus-agency/platform/.github/workflows/ci.yml@v1
    secrets: inherit

  release:
    needs: ci
    uses: refokus-agency/platform/.github/workflows/release.yml@v1
    secrets: inherit
