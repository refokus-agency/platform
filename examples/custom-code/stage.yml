# Custom-code stage — runs CI and deploys to stage on push to main.
# Copy to .github/workflows/stage.yml in the custom-code repo.

name: Deploy Stage

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: refokus-agency/platform/.github/workflows/ci.yml@main
    secrets: inherit

  deploy-stage:
    needs: ci
    uses: refokus-agency/platform/.github/workflows/deploy.yml@main
    with:
      environment: stage
    secrets: inherit
