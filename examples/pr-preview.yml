# CI + Vercel preview deploy on pull requests.
# Copy to .github/workflows/pr-preview.yml in your repo.

name: Pull Request

on:
  pull_request:

permissions:
  contents: read
  packages: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ci:
    uses: refokus-agency/platform/.github/workflows/ci.yml@v1
    secrets: inherit

  deploy-preview:
    needs: ci
    if: github.actor != 'dependabot[bot]'
    uses: refokus-agency/platform/.github/workflows/deploy.yml@v1
    with:
      environment: preview
    secrets: inherit
