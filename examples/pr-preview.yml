# CI + Vercel preview deploy on pull requests.
# Copy to .github/workflows/pr-preview.yml in your repo.
#
# workflow_dispatch is enabled so that Dependabot PRs (which run without
# access to secrets automatically) can be re-triggered manually from the
# Actions tab. A human-initiated dispatch runs with secrets and updates
# the PR's check status — pair with branch protection requiring this
# check. See docs/dependabot.md in refokus-agency/platform.

name: Pull Request

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: refokus-agency/platform/.github/workflows/ci.yml@main
    secrets: inherit

  deploy-preview:
    needs: ci
    uses: refokus-agency/platform/.github/workflows/deploy.yml@main
    with:
      environment: preview
    secrets: inherit
