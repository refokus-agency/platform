# CI + Vercel production deploy on push to production branch (for 3-env Vercel repos).
# Copy to .github/workflows/production-deploy.yml in your repo.
#
# workflow_dispatch is enabled as an escape hatch — it lets you re-run
# a production deploy from the Actions tab without pushing a new commit.

name: Deploy Production

on:
  push:
    branches: [production]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: refokus-agency/platform/.github/workflows/ci.yml@main
    secrets: inherit

  deploy-production:
    needs: ci
    uses: refokus-agency/platform/.github/workflows/deploy.yml@main
    with:
      environment: production
    secrets: inherit
