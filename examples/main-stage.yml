# CI + Vercel stage deploy on push to main (for 3-env Vercel repos).
# Copy to .github/workflows/main-stage.yml in your repo.
#
# workflow_dispatch is enabled as an escape hatch — it lets you re-run
# a stage deploy from the Actions tab without pushing a new commit.

name: Deploy Stage

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: refokus-agency/platform/.github/workflows/ci.yml@main
    secrets: inherit

  deploy-stage:
    needs: ci
    uses: refokus-agency/platform/.github/workflows/deploy.yml@main
    with:
      environment: stage
    secrets: inherit
