# CI + Vercel stage deploy on push to main (for 3-env Vercel repos).
# Copy to .github/workflows/main-stage.yml in your repo.
#
# workflow_dispatch is kept as an escape hatch — lets you re-run a stage
# deploy from the Actions tab without pushing a new commit.

name: Deploy Stage

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  pull-requests: write
  deployments: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: refokus-agency/platform/.github/workflows/ci.yml@v1
    secrets: inherit

  deploy-stage:
    needs: ci
    uses: refokus-agency/platform/.github/workflows/deploy.yml@v1
    with:
      environment: stage
    secrets: inherit
