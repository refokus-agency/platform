# Library caller — CI on PRs, release on push to main.
# Copy this file to .github/workflows/ci-release.yml in the library repo.

name: CI + Release

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: refokus-agency/platform/.github/workflows/ci.yml@main
    secrets: inherit

  release:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: refokus-agency/platform/.github/workflows/release.yml@main
    secrets: inherit
